<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>JasonBai · Projects</title>
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c9980a" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    :root {
      --bg: #f5f5f7;
      --bg-card: #ffffff;
      --bg-item: #f9f9fb;
      --border: rgba(0, 0, 0, 0.07);
      --border-h: rgba(180, 140, 0, 0.35);
      --gold: #c9980a;
      --gold-dim: rgba(201, 152, 10, 0.08);
      --text: #1a1a1e;
      --text-dim: #969696;
      --text-mid: #6b6b7e;
      --ok: #1a9e45;
      --fail: #d93025;
      --ok-glow: rgba(26, 158, 69, 0.25);
      --fail-glow: rgba(217, 48, 37, 0.25);
      --radius: 14px;
      --radius-sm: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 805px;
      margin: 0 auto;
      padding: 60px 24px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 52px;
      letter-spacing: -1px;
      color: var(--gold);
      line-height: 1;
      display: inline-block;
      margin-bottom: 30px;
    }

    .logo::after {
      content: "";
      display: block;
      width: 32px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin: 10px auto 0;
      opacity: 0.5;
    }

    .logo+p {
      color: var(--text-dim);
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      animation: fadeUp 0.6s ease both;
    }

    .card:nth-child(2) {
      animation-delay: 0.07s;
    }

    .card:nth-child(3) {
      animation-delay: 0.14s;
    }

    .card:nth-child(4) {
      animation-delay: 0.21s;
    }

    .card:nth-child(5) {
      animation-delay: 0.28s;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: "";
      width: 3px;
      height: 14px;
      background: var(--gold);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Btn ── */
    .btn-check {
      font-family: "Outfit", sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      cursor: pointer;
      transition:
        color 0.2s,
        border-color 0.2s,
        background 0.2s;
      white-space: nowrap;
    }

    .btn-check:hover:not(:disabled) {
      color: var(--gold);
      border-color: var(--border-h);
      background: var(--gold-dim);
    }

    .btn-check:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Server Toggle ── */
    .server-toggle-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: -20px;
      margin-bottom: 20px;
    }

    .server-toggle {
      display: inline-flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px;
      position: relative;
      gap: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      min-width: 140px;
    }

    .server-toggle::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: var(--gold);
      border-radius: 4px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .server-toggle.is-netlify::before {
      transform: translateX(100%);
    }

    .toggle-item {
      position: relative;
      z-index: 1;
      padding: 4px 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
      transition: color 0.3s;
      user-select: none;
      flex: 1;
      text-align: center;
    }

    .toggle-item.active {
      color: #fff;
    }

    /* ── URL grid ── */
    .url-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .url-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      text-decoration: none;
      transition:
        border-color 0.2s,
        background 0.2s,
        transform 0.15s,
        box-shadow 0.15s;
    }

    .url-item:hover {
      border-color: var(--border-h);
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
    }

    .url-info {
      min-width: 0;
    }

    .url-host {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 3px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
      transition:
        background 0.35s,
        box-shadow 0.35s;
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok-glow);
    }

    .dot.fail {
      background: var(--fail);
      box-shadow: 0 0 8px var(--fail-glow);
    }

    .dot.checking {
      background: var(--gold);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    footer {
      text-align: center;
      padding: 32px 0 0;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .wrap {
        padding: 40px 16px;
      }

      .logo {
        font-size: 36px;
      }

      .url-grid {
        grid-template-columns: 1fr;
      }

      .dns-servers {
        flex-direction: column;
      }
    }

    /* 防止 Vue 模板闪烁 */
    [v-cloak] {
      display: none;
    }
  </style>
</head>

<body>

    <!-- 服务器切换按钮 -->
    <div class="server-toggle-wrap">

    </div>

    <!-- 循环构建每一个模块 -->
    <div v-for="module in modules" :key="module.id" class="card" :id="module.id">

        <div class="section-title">{{ module.title }}</div>
        <!-- 仅在支持检测的模块显示检测按钮 -->
        <button v-if="module.canCheck" class="btn-check" :disabled="module.checking" @click="checkModule(module)">
          {{ module.checking ? '检测中…' : (module.checked ? '重新检测' : '检测状态') }}
        </button>
      </div>
      <div class="url-grid">
        <a v-for="(link, index) in module.links" :key="index"
          :href="currentServer === 'NpDNS' ? link.npdnsUrl : link.netlifyUrl"
          :class="['url-item', { 'detect-link': module.canCheck }]" target="_blank">
          <div class="url-info">
            <span class="url-host">{{ link.name }}</span>
            <span class="url-label">{{ formatUrl(currentServer === 'NpDNS' ? link.npdnsUrl : link.netlifyUrl) }}</span>
          </div>
          <!-- 状态指示灯，仅在支持检测的模块显示 -->
          <div v-if="module.canCheck" :class="['dot', link.status]"></div>
        </a>
      </div>
    </div>

    <footer>{{ footerText }}</footer>
  </div>

          return url ? url.replace('https://', '') : '';
        },
        /**
         * 检查单个 URL 的连通性
         * @param {Object} link - 链接对象
         */
        async checkUrl(link) {
          link.status = "checking";
          const url = this.currentServer === 'NpDNS' ? link.npdnsUrl : link.netlifyUrl;
          const ctrl = new AbortController();
          const tid = setTimeout(() => ctrl.abort(), 6000);
          try {
            await fetch(url, { mode: "no-cors", signal: ctrl.signal });
            link.status = "ok";
          } catch {
            link.status = "fail";
          } finally {
            clearTimeout(tid);
          }
        },
        /**
         * 检查特定模块下的所有链接
         * @param {Object} module - 模块对象
         */
        async checkModule(module) {
          module.checking = true;
          const checkPromises = module.links.map(link => this.checkUrl(link));
          await Promise.all(checkPromises);
          module.checking = false;
          module.checked = true;
        }
      },
      mounted() {
        /* PWA Service Worker 注册 */
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", () => {
            navigator.serviceWorker
              .register("sw.js")
              .then((registration) => {
                console.log("SW registered: ", registration);
              })
              .catch((registrationError) => {
                console.log("SW registration failed: ", registrationError);
              });
          });
        }
      }
